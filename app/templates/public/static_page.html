{% extends 'base_public.html' %}
{% block title %}{{ page.title }} · VistaTravel{% endblock %}
{% block content %}
<section class="tt-page-hero py-4">
  <div class="container">
    <h1 class="h2 fw-bold mb-0">{{ page.title }}</h1>
  </div>
</section>
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-9 col-xl-8">
      <article class="tt-panel border-0 shadow">
        <div class="tt-panel-body tt-prose p-4 p-lg-5">
          {{ page.content | safe }}
        </div>
      </article>
    </div>
  </div>
</div>
{% endblock %}
