{% extends 'base_admin.html' %}
{% block title %}Password{% endblock %}
{% block page_title %}Change password{% endblock %}
{% block content %}
<form method="post" class="card card-tt p-4 col-md-6">
  <input class="form-control mb-2" type="password" name="current_password" placeholder="Current" required>
  <input class="form-control mb-2" type="password" name="password" placeholder="New" required>
  <input class="form-control mb-2" type="password" name="confirm_password" placeholder="Confirm" required>
  <button class="btn btn-tt-primary">Update</button>
</form>
{% endblock %}
