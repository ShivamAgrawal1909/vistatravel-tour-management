{% extends 'base_admin.html' %}
{% block page_title %}Testimonials{% endblock %}
{% block content %}
<a class="btn btn-tt-primary mb-3" href="{{ url_for('admin.testimonial_form') }}">Add</a>
<div class="table-responsive card card-tt"><table class="table mb-0"><tbody>
{% for t in items %}<tr><td>{{ t.customer_name }}</td><td>{{ t.content[:80] }}…</td><td>{{ t.is_visible }}</td><td><a href="{{ url_for('admin.testimonial_form', tid=t.id) }}">Edit</a>
<form class="d-inline" method="post" action="{{ url_for('admin.testimonial_delete', tid=t.id) }}" onsubmit="return confirm('Delete?')"><button class="btn btn-link btn-sm text-danger p-0">Del</button></form>
</td></tr>{% endfor %}
</tbody></table></div>
{% endblock %}
