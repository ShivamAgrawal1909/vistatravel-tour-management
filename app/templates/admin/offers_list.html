{% extends 'base_admin.html' %}
{% block page_title %}Offers{% endblock %}
{% block content %}
<a class="btn btn-tt-primary mb-3" href="{{ url_for('admin.offer_form') }}">Add offer</a>
<div class="table-responsive card card-tt"><table class="table mb-0"><thead><tr><th>Title</th><th>Package</th><th>Active</th><th></th></tr></thead><tbody>
{% for o in items %}<tr><td>{{ o.title }}</td><td>{{ o.package.title if o.package }}</td><td>{{ o.is_active }}</td><td><a href="{{ url_for('admin.offer_form', oid=o.id) }}">Edit</a>
<form class="d-inline" method="post" action="{{ url_for('admin.offer_delete', oid=o.id) }}" onsubmit="return confirm('Delete?')"><button class="btn btn-link btn-sm text-danger p-0">Del</button></form>
</td></tr>{% endfor %}
</tbody></table></div>
{% endblock %}
