{% extends 'base_admin.html' %}
{% block page_title %}Hotels{% endblock %}
{% block content %}
<a class="btn btn-tt-primary mb-3" href="{{ url_for('admin.hotel_form') }}">Add hotel</a>
<div class="table-responsive card card-tt"><table class="table mb-0"><thead><tr><th>Name</th><th>Type</th><th></th></tr></thead><tbody>
{% for h in items %}<tr><td>{{ h.name }}</td><td>{{ h.hotel_type }}</td><td><a href="{{ url_for('admin.hotel_form', hid=h.id) }}">Edit</a>
<form class="d-inline" method="post" action="{{ url_for('admin.hotel_delete', hid=h.id) }}" onsubmit="return confirm('Delete?')"><button class="btn btn-link btn-sm text-danger p-0">Del</button></form></td></tr>{% endfor %}
</tbody></table></div>
{% endblock %}
