{% extends 'base_admin.html' %}
{% block page_title %}Edit user{% endblock %}
{% block content %}
<form method="post" class="card card-tt p-4 col-lg-7">
  <input class="form-control mb-2" name="full_name" value="{{ user.full_name }}">
  <input class="form-control mb-2" type="email" name="email" value="{{ user.email }}">
  <input class="form-control mb-2" name="mobile" value="{{ user.mobile or '' }}">
  <textarea class="form-control mb-2" name="address" rows="2">{{ user.address or '' }}</textarea>
  <input class="form-control mb-2" name="gender" value="{{ user.gender or '' }}">
  <div class="form-check mb-3"><input class="form-check-input" type="checkbox" name="is_active" {% if user.is_active %}checked{% endif %}><label class="form-check-label">Active</label></div>
  <button class="btn btn-tt-primary">Save</button>
</form>
{% endblock %}
