{% extends 'base_admin.html' %}
{% block page_title %}Gallery item{% endblock %}
{% block content %}
<form method="post" enctype="multipart/form-data" class="card card-tt p-4 col-lg-7">
  <input class="form-control mb-2" name="title" value="{{ item.title if item else '' }}">
  <select class="form-select mb-2" name="destination_id"><option value="">Destination</option>{% for d in destinations %}<option value="{{ d.id }}" {% if item and item.destination_id==d.id %}selected{% endif %}>{{ d.name }}</option>{% endfor %}</select>
  <select class="form-select mb-2" name="package_id"><option value="">Package</option>{% for p in packages %}<option value="{{ p.id }}" {% if item and item.package_id==p.id %}selected{% endif %}>{{ p.title }}</option>{% endfor %}</select>
  <input class="form-control mb-2" type="file" name="image">
  <div class="form-check mb-3"><input class="form-check-input" type="checkbox" name="is_visible" {% if not item or item.is_visible %}checked{% endif %}><label class="form-check-label">Visible</label></div>
  <button class="btn btn-tt-primary">Save</button>
</form>
{% endblock %}
