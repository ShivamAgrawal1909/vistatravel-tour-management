<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Receipt {{ booking.public_id }}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="p-4" onload="window.print()">
<div class="col-lg-6 mx-auto">
  <h3>VistaTravel</h3>
  <p class="text-muted">Booking invoice</p>
  <hr>
  <p><strong>ID:</strong> {{ booking.public_id }}</p>
  <p><strong>Guest:</strong> {{ booking.user.full_name if booking.user }}</p>
  <p><strong>Package:</strong> {{ booking.package.title if booking.package }}</p>
  <p><strong>Amount:</strong> ₹ {{ booking.total_amount }}</p>
  <p><strong>Status:</strong> {{ booking.status }} / {{ booking.payment_status }}</p>
</div>
</body>
</html>
