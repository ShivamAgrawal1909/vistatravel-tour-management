{% extends 'base_admin.html' %}
{% block page_title %}Enquiry{% endblock %}
{% block content %}
<div class="card card-tt p-4 col-lg-8">
  <p><strong>{{ enquiry.name }}</strong> · {{ enquiry.email }} · {{ enquiry.phone }}</p>
  <p>{{ enquiry.message }}</p>
  <form method="post">
    <div class="form-check mb-2"><input class="form-check-input" type="checkbox" name="is_read" {% if enquiry.is_read %}checked{% endif %}><label class="form-check-label">Mark read</label></div>
    <textarea class="form-control mb-2" name="admin_reply" rows="3" placeholder="Reply / note">{{ enquiry.admin_reply or '' }}</textarea>
    <select class="form-select mb-2" name="status">{% for s in ['open','closed'] %}<option {% if enquiry.status==s %}selected{% endif %}>{{ s }}</option>{% endfor %}</select>
    <button class="btn btn-tt-primary">Save</button>
  </form>
</div>
{% endblock %}
