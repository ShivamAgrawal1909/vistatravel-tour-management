<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin · VistaTravel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/theme.css') }}" rel="stylesheet">
</head>
<body class="hero-section d-flex align-items-center justify-content-center" style="min-height:100vh">
  <div class="card shadow-lg border-0 col-11 col-md-5 rounded-4">
    <div class="card-body p-4 p-md-5">
      <h1 class="h4 fw-bold mb-1 text-dark">VistaTravel Admin</h1>
      <p class="text-muted small mb-4">Secure operator console</p>
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} py-2">{{ message }}</div>
        {% endfor %}
      {% endwith %}
      <form method="post">
        <input type="hidden" name="next" value="{{ next_url or '' }}">
        <div class="mb-3"><input class="form-control form-control-lg" name="username" placeholder="Username or email" required></div>
        <div class="mb-3"><input class="form-control form-control-lg" type="password" name="password" placeholder="Password" required></div>
        <button class="btn btn-tt-primary w-100 btn-lg">Sign in</button>
      </form>
      <div class="d-flex justify-content-between mt-3 small">
        <a href="{{ url_for('admin_auth.forgot') }}">Forgot password</a>
        <a href="{{ url_for('public.home') }}">Back to site</a>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
