{% extends 'base_admin.html' %}
{% block page_title %}Hotel{% endblock %}
{% block content %}
<form method="post" enctype="multipart/form-data" class="card card-tt p-4 col-lg-8">
  <input class="form-control mb-2" name="name" value="{{ hotel.name if hotel else '' }}" required>
  <input class="form-control mb-2" name="hotel_type" placeholder="Star / type" value="{{ hotel.hotel_type if hotel else '' }}">
  <input class="form-control mb-2" name="room_type" value="{{ hotel.room_type if hotel else '' }}">
  <input class="form-control mb-2" name="location" value="{{ hotel.location if hotel else '' }}">
  <textarea class="form-control mb-2" name="description" rows="3">{{ hotel.description if hotel else '' }}</textarea>
  <input class="form-control mb-2" type="file" name="image">
  <button class="btn btn-tt-primary">Save</button>
</form>
{% endblock %}
