{% extends 'base_admin.html' %}
{% block page_title %}Coupon{% endblock %}
{% block content %}
<form method="post" class="card card-tt p-4 col-md-7">
  <input class="form-control mb-2" name="code" value="{{ coupon.code if coupon else '' }}" required>
  <select class="form-select mb-2" name="discount_type"><option value="percent" {% if coupon and coupon.discount_type=='percent' %}selected{% endif %}>percent</option><option value="fixed" {% if coupon and coupon.discount_type=='fixed' %}selected{% endif %}>fixed</option></select>
  <input class="form-control mb-2" type="number" step="0.01" name="amount" value="{{ coupon.amount if coupon else '' }}" required>
  <input class="form-control mb-2" type="number" step="0.01" name="min_booking_amount" value="{{ coupon.min_booking_amount if coupon else 0 }}">
  <input class="form-control mb-2" type="date" name="expiry_date" value="{{ coupon.expiry_date.strftime('%Y-%m-%d') if coupon and coupon.expiry_date else '' }}">
  <input class="form-control mb-2" type="number" name="usage_limit" value="{{ coupon.usage_limit if coupon else 100 }}">
  <div class="form-check mb-3"><input class="form-check-input" type="checkbox" name="is_active" {% if not coupon or coupon.is_active %}checked{% endif %}><label class="form-check-label">Active</label></div>
  <button class="btn btn-tt-primary">Save</button>
</form>
{% endblock %}
