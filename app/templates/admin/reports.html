{% extends 'base_admin.html' %}
{% block page_title %}Reports{% endblock %}
{% block content %}
<div class="row g-3">
  <div class="col-md-4"><div class="card card-tt p-3"><h6>Bookings CSV</h6><form method="get" action="{{ url_for('admin.report_bookings_csv') }}"><input class="form-control mb-2" type="date" name="start"><input class="form-control mb-2" type="date" name="end"><button class="btn btn-tt-primary w-100">Download</button></form></div></div>
  <div class="col-md-4"><div class="card card-tt p-3"><h6>Payments CSV</h6><a class="btn btn-tt-primary w-100" href="{{ url_for('admin.report_payments_csv') }}">Download</a></div></div>
  <div class="col-md-4"><div class="card card-tt p-3"><h6>Users CSV</h6><a class="btn btn-tt-primary w-100" href="{{ url_for('admin.report_users_csv') }}">Download</a></div></div>
</div>
{% endblock %}
